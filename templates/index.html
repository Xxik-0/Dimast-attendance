<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>축구팀 참석 투표</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        .container { max-width: 500px; margin-top: 30px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-check:checked + .btn { filter: brightness(0.9); border: 2px solid #000; }
        .member-list { background: white; border-radius: 10px; padding: 15px; }
        .member-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
        .member-item:last-child { border-bottom: none; }
        .badge-count { font-size: 1.2rem; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2 class="fw-bold">⚽ 이번 주 경기 투표</h2>
        <p class="text-muted">50명 정원 중 현재 참석 인원을 확인하세요!</p>
    </div>

    <div class="card mb-4">
        <div class="card-body p-4">
            <form action="/join" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">이름</label>
                    <input type="text" class="form-control form-control-lg" id="name" name="name" placeholder="실명을 입력하세요" required>
                </div>
                
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <button type="submit" name="status" value="참석" class="btn btn-primary btn-lg w-100 py-3 fw-bold">참석</button>
                    </div>
                    <div class="col-6">
                        <button type="submit" name="status" value="불참" class="btn btn-outline-danger btn-lg w-100 py-3 fw-bold">불참</button>
                    </div>
                </div>
                <small class="text-center d-block text-muted">이미 투표했다면 이름 입력 후 다시 누르면 수정됩니다.</small>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">참석자 명단</h4>
        <span class="badge bg-success badge-count">{{ count }}명 참석 중</span>
    </div>

    <div class="member-list shadow-sm">
        {% if members %}
            {% for member in members %}
            <div class="member-item">
                <span class="fw-bold" style="font-size: 1.1rem;">{{ member[0] }}</span>
                <span class="text-primary small">✅ 참석 확정</span>
            </div>
            {% endfor %}
        {% else %}
            <p class="text-center text-muted my-3">아직 투표한 인원이 없습니다.</p>
        {% endif %}
    </div>
    
    <div class="text-center mt-5 pb-5">
        <p class="text-secondary small">© 2026 우리 축구팀 명단 관리</p>
    </div>
</div>

</body>
</html>
